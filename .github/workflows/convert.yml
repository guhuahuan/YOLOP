name: Convert ONNX to CoreML
on:
  push:
    branches: [ main ] # 當你 push 到 main 分支時觸發
  workflow_dispatch: # 允許手動點擊按鈕觸發

jobs:
  convert:
    runs-on: macos-latest # 使用 GitHub 提供的 Mac 虛擬機
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install coremltools onnx

      - name: Run Conversion Script
        run: |
          python - <<EOF
          import coremltools as ct
          import onnx
          
          onnx_model = 'yolop-640-640.onnx'
          output_name = 'YOLOP.mlpackage'
          
          mlmodel = ct.convert(
              onnx_model,
              source='onnx',
              minimum_deployment_target=ct.target.iOS15,
              inputs=[ct.ImageType(name="input", 
                                   shape=(1, 3, 640, 640), 
                                   scale=1/255.0, 
                                   color_layout=ct.colorlayout.RGB)]
          )
          mlmodel.save(output_name)
          EOF

      - name: Zip Model
        run: zip -r YOLOP_CoreML.zip YOLOP.mlpackage

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YOLOP-CoreML-Model
          path: YOLOP_CoreML.zip
